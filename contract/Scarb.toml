[package]
name = "bci_starknet"
version = "1.0.0"
edition = "2024_07"
description = "BCI — Behavioral Commitment Identity on Starknet. Zero-knowledge AI agent identity without stored credentials."
authors = ["Adeyeye George <manomitehq@gmail.com>"]
license = "MIT"

[dependencies]
starknet = ">=2.8.0"

[[target.starknet-contract]]
sierra = true
casm = true

[dev-dependencies]
snforge_std = { git = "https://github.com/foundry-rs/starknet-foundry", tag = "v0.31.0" }

[scripts]
test   = "snforge test"
build  = "scarb build"
deploy = "node src/deploy.js"
demo   = "node src/demo.js"
[package]
name = "bci_starknet"
version = "1.0.0"
edition = "2024_07"
description = "BCI — Behavioral Commitment Identity on Starknet. Zero-knowledge AI agent identity without stored credentials."
authors = ["Adeyeye George <manomitehq@gmail.com>"]
license = "MIT"

[dependencies]
starknet = ">=2.8.0"
openzeppelin_access = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v0.19.0" }
openzeppelin_security = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v0.19.0" }
openzeppelin_token = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v0.19.0" }
openzeppelin_upgrades = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v0.19.0" }

[[target.starknet-contract]]
sierra = true
casm = true
[package]
name = "bci_starknet"
version = "1.0.0"
edition = "2024_07"
description = "BCI — Behavioral Commitment Identity on Starknet. Zero-knowledge AI agent identity without stored credentials."
authors = ["Adeyeye George <manomitehq@gmail.com>"]
license = "MIT"

[dependencies]
starknet = ">=2.8.0"

[[target.starknet-contract]]
sierra = true
casm = true

[dev-dependencies]
snforge_std = { version = "0.31.0", registry = "scarbs_xyz" }

[registries]
scarbs_xyz = { index = "https://scarbs.xyz/" }

[scripts]
test   = "snforge test"
build  = "scarb build"